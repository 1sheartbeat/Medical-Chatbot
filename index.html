<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist - AI Medical Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #1e2a3a;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .logo {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2c7da0, #61a5c2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon i {
            font-size: 20px;
            color: white;
        }

        .logo-text span {
            font-size: 18px;
            font-weight: 700;
        }

        .logo-text small {
            font-size: 10px;
            opacity: 0.7;
        }

        .new-chat-btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 12px;
            background: #2c7da0;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .new-chat-btn:hover {
            background: #1f5e7a;
        }

        .history-title {
            padding: 0 20px 10px 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }

        .session-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .session-item.active {
            background: rgba(44,125,160,0.3);
            border-left: 3px solid #2c7da0;
        }

        .session-info {
            flex: 1;
            overflow: hidden;
        }

        .session-title {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-date {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .delete-session {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            display: none;
        }

        .session-item:hover .delete-session {
            display: block;
        }

        .delete-session:hover {
            color: #e76f51;
        }

        .model-selector {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .model-selector label {
            display: block;
            font-size: 11px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.6);
        }

        .model-selector select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .model-selector select option {
            background: #1e2a3a;
        }

        #currentModel {
            font-size: 10px;
            margin-top: 8px;
            color: rgba(255,255,255,0.4);
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }

        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2c7da0;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .welcome-message {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .welcome-message h2 {
            color: #2c7da0;
            margin-bottom: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: #2c7da0;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
        }

        textarea:focus {
            border-color: #2c7da0;
        }

        button {
            padding: 12px 20px;
            background: #2c7da0;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }

        button:hover {
            background: #1f5e7a;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .toast {
            background: #333;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 8px;
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: #2e8b57; }
        .toast.error { background: #e76f51; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <div class="logo-text">
                    <span>MediAssist</span>
                    <small>AI Medical Assistant</small>
                </div>
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i> New Chat
            </button>

            <div class="history-title">
                <i class="fas fa-history"></i> Conversation History
            </div>

            <div class="session-list" id="sessionList">
                <!-- Sessions will be loaded here -->
            </div>

            <!-- Model Selector -->
            <div class="model-selector">
                <label><i class="fas fa-microchip"></i> AI Model</label>
                <select id="modelSelect">
                    <option value="gemma3:4b">🌱 Gemma 3 4B (Fast)</option>
                    <option value="llama3:8b">🦙 Llama 3 8B (Balanced)</option>
                    <option value="deepseek-r1:7b">🔍 DeepSeek R1 7B (Medical)</option>
                </select>
                <div id="currentModel">Current: gemma3:4b</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <h1><i class="fas fa-robot"></i> MediAssist</h1>
                <div class="status">
                    <div class="status-dot"></div>
                    <span>Online</span>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message" id="welcomeMessage">
                    <h2>Welcome to MediAssist</h2>
                    <p>Your AI medical assistant. Ask me about symptoms, medications, or general health.</p>
                    <p style="margin-top: 15px; font-size: 13px; color: #666;">⚠️ I provide general information only. For emergencies, call 911.</p>
                </div>
                <div id="messagesList"></div>
            </div>

            <div class="input-area">
                <textarea id="userInput" placeholder="Type your question here..." rows="1"></textarea>
                <button id="sendBtn">Send</button>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
